name: OpenAI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Run PR Review
        id: review
        continue-on-error: true
        uses: rajputnirmal91/openai-pr-reviewer@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Report status
        run: |
          echo "PR review step completed (or failed safely)."
